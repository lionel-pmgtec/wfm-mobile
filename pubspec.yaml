name: wfm_mobile
description: Application WFM Mobile - SAP Work Manager Flutter

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^13.0.0

  # State management
  flutter_riverpod: ^2.5.0
  riverpod_annotation: ^2.3.0

  # HTTP / SAP OData
  dio: ^5.4.0
  retrofit: ^4.1.0

  # Secure storage (token SAP)
  flutter_secure_storage: ^9.0.0

  # Local cache
  hive_flutter: ^1.1.0

  # Barcode scanner
  mobile_scanner: ^5.0.0

  # File upload
  image_picker: ^1.0.7
  file_picker: ^8.0.0

  # Map
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # Excel import/export
  excel: ^4.0.6

  # Push / local notifications
  flutter_local_notifications: ^17.2.4
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3

  # Geolocalizzazione (Play/Stop OdL, foto, mappa)
  geolocator: ^13.0.1

  # Background sync periodico (ogni 15 min)
  workmanager: ^0.5.2

  # Compressione foto
  flutter_image_compress: ^2.3.0
  path_provider: ^2.1.4

  # UI utilities
  shimmer: ^3.0.0
  intl: ^0.19.0
  cached_network_image: ^3.3.0
  flutter_svg: ^2.0.10
  lottie: ^3.0.0
  url_launcher: ^6.2.6

  # PDF (generazione preventivo + anteprima/condivisione)
  pdf: ^3.10.8
  printing: ^5.13.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.0
  riverpod_generator: ^2.3.0
  retrofit_generator: ^8.1.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
