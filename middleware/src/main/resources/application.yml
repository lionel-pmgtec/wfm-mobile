server:
  port: 8080
  servlet:
    context-path: /api/v1   # base URL = http://localhost:8080/api/v1

spring:
  application:
    name: wfm-middleware
  jackson:
    default-property-inclusion: non_null   # non serializza i campi null

# Swagger UI: http://localhost:8080/api/v1/swagger-ui.html
springdoc:
  swagger-ui:
    path: /swagger-ui.html

# Parametri verso SAP (usati quando si attiverà il client SOAP).
sap:
  soap:
    endpoint: https://sap.client.local/sap/bc/srt/wsdl
    username: WFM_SERVICE
    # password: da fornire via variabile d'ambiente SAP_SOAP_PASSWORD
    client: "100"
